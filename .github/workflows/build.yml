name: Build installers

# Builds UNSIGNED distributables on real runners (no Wine cross-build):
#   - macOS universal .dmg on a macos runner
#   - Windows x64 NSIS installer + portable .zip on a windows runner
# Triggered on a version tag (e.g. v0.1.0) or manually. Artifacts are uploaded
# to the workflow run; on a tag push, the `release` job also publishes a GitHub
# Release with both platforms' installers attached as downloadable assets.
#
# NOTE: assets/icons/icon.icns and assets/icons/icon.ico must be committed for
# these to pass — electron-builder errors if the icon is missing (we never ship
# the default icon).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  macos:
    name: macOS universal .dmg
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build (unsigned)
        run: npm run dist:mac
        env:
          # Unsigned: do not try to discover a signing identity or notarize.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: screenchart-macos
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    name: Windows x64 installer + portable zip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build (unsigned)
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: screenchart-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    # Only on a tag push — a Release needs a tag (skipped for workflow_dispatch).
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write          # required to create the Release
    steps:
      # Pull every artifact from the build jobs into ./artifacts/<name>/...
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release with installers
        uses: softprops/action-gh-release@v2
        with:
          # Uses the pushed tag automatically. Attach the Mac .dmg and the
          # Windows .exe/.zip from the downloaded artifacts.
          files: artifacts/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          # Pre-release only when the tag has a suffix (v0.1.0-beta.1, -rc.1, …);
          # plain tags (v1.0.0) publish as a normal "Latest" release.
          prerelease: ${{ contains(github.ref_name, '-') }}
