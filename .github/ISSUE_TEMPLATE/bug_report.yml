name: 🐛 Bug report
description: Something isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the report — a clear repro helps a lot on a solo project."
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What you did, what you expected, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so it can be reproduced.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: From the app / release tag.
      placeholder: 0.1.0-beta.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: AI provider / agent in use
      options:
        - Anthropic
        - OpenAI
        - Gemini
        - gateway/OpenRouter/Ollama
        - Claude Code CLI
        - Cursor Agent CLI
        - other/none
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or drag in screenshots.
    validations:
      required: false
