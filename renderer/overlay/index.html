<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; style-src 'self'; script-src 'self';"
    />
    <link rel="stylesheet" href="../theme.css" />
    <link rel="stylesheet" href="overlay.css" />
    <title>Screenchart — Select region</title>
  </head>
  <body>
    <!-- The frozen screenshot fills the viewport; the dim layer sits on top. -->
    <img id="frame" alt="" draggable="false" />
    <div id="dim"></div>
    <div id="selection" hidden>
      <span id="dims" class="sel-dims"></span>
      <span class="handle h-nw"></span>
      <span class="handle h-ne"></span>
      <span class="handle h-sw"></span>
      <span class="handle h-se"></span>
    </div>

    <!-- hint at top center, always visible -->
    <div id="hint" class="overlay-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.7"/>
      </svg>
      Drag a box around a chart or table
      <kbd>Esc</kbd> to cancel
    </div>

    <script src="overlay.js"></script>
  </body>
</html>
